---
- name: Setup Java Maven Docker Jenkins Build Server
 hosts: localhost
 connection: local
 become: true
 tasks:
 - name: Update APT package cache
 ansible.builtin.apt:
 update_cache: yes
 - name: Install Java (OpenJDK 17)
 ansible.builtin.package:
 name: openjdk-17-jdk
 state: present
 - name: Install Maven
 ansible.builtin.package:
 name: maven
 state: present
 - name: Install prerequisite packages
 ansible.builtin.package:
 name:
 - apt-transport-https
 - ca-certificates
 - curl
 - gnupg
 - software-properties-common
 state: present
 - name: Install Docker GPG key
 ansible.builtin.apt_key:
 url: https://download.docker.com/linux/ubuntu/gpg
 state: present
 - name: Add Docker repository
 ansible.builtin.apt_repository:
 repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{
ansible_distribution_release }} stable"
 state: present
 filename: docker
 - name: Install Docker
 ansible.builtin.package:
 name:
 - docker-ce
 - docker-ce-cli
 - containerd.io
 state: present
 - name: Enable and start Docker
 ansible.builtin.service:
 name: docker
 enabled: yes
 state: started
 - name: Add current user to docker group
 ansible.builtin.user:
 name: "{{ ansible_user_id }}"
 groups: docker
 append: yes
 - name: Add Jenkins APT repository (ignore signing)
 ansible.builtin.apt_repository:
 repo: "deb [trusted=yes] https://pkg.jenkins.io/debian-stable binary/"
 state: present
 filename: jenkins
 - name: Update APT cache after adding Jenkins repo
 ansible.builtin.apt:
 update_cache: yes
 - name: Install Jenkins
 ansible.builtin.package:
 name: jenkins
 state: present
 - name: Enable and start Jenkins
 ansible.builtin.service:
 name: jenkins
 enabled: yes
 state: started
